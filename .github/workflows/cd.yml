name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  DEPLOY_HOST: league-of-data-base.fr

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deployable assets
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Register deployment host
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: ssh root@"$DEPLOY_HOST" "mkdir -p '${{ secrets.PATH_PROD }}' '${{ secrets.PATH_PROD }}/dist'"

      - name: Sync site to production
        run: |
          rsync -az --delete \
            index.html \
            shrek.mp4 \
            meta \
            src \
            root@"$DEPLOY_HOST":"${{ secrets.PATH_PROD }}/"

          rsync -az --delete \
            .generated/dist/ \
            root@"$DEPLOY_HOST":"${{ secrets.PATH_PROD }}/dist/"

      - name: Reload Apache
        run: ssh root@"$DEPLOY_HOST" "systemctl reload apache2"
