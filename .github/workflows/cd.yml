name: CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_HOST: league-of-data-base.fr

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deployable assets
        run: npm run build

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Register deployment host
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" "mkdir -p '${{ secrets.PATH_PROD }}' '${{ secrets.PATH_PROD }}/dist'"

      - name: Sync site to production
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            index.html \
            shrek.mp4 \
            meta \
            src \
            root@"$DEPLOY_HOST":"${{ secrets.PATH_PROD }}/"

          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            .generated/dist/ \
            root@"$DEPLOY_HOST":"${{ secrets.PATH_PROD }}/dist/"

      - name: Reload Apache
        run: ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" "systemctl reload apache2"
